# Skills catalog — reproducible external skills used across Paperclip agents.
# Install via Paperclip API: POST /api/companies/{id}/skills
# Or use scripts/install-skills.sh after creating a company.

skills:
  # ─── Paperclip meta-skills (how agents understand Paperclip itself) ───
  - slug: paperclip
    source: local_path
    locator: /app/skills/paperclip
    required: true
    description: Core Paperclip skill — how agents operate inside Paperclip.
  - slug: paperclip-create-agent
    source: local_path
    locator: /app/skills/paperclip-create-agent
    required: true
  - slug: paperclip-create-plugin
    source: local_path
    locator: /app/skills/paperclip-create-plugin
    required: true
  - slug: para-memory-files
    source: local_path
    locator: /app/skills/para-memory-files
    required: true
    description: PARA-method memory file conventions for agents.

